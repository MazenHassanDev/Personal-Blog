{% extends "base.html" %}
{% block title %}Personal Blog{% endblock %}

{% block content %}

    <div class="nav">   
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>

    <div class="admin-dashboard">
        <h1>Personal Blog <a href="{{ url_for('add_article') }}">+ Add</a></h1>


        {% for article in articles %}
            <div class="article">
                <h2>
                    <a href="{{ url_for('article', article_id=article['id']) }}">{{ article['title'] }}</a>
                    <span class="edit">
                        <a href="{{ url_for('edit_article', article_id=article['id']) }}">Edit</a>
                        <form method="post"
                            action="{{ url_for('delete_article', article_id=article['id']) }}"
                            onsubmit="return confirm('Delete this article?');">
                            <button type="submit">Delete</button>
                        </form>
                    </span>
                </h2>
            </div>
        {% endfor %}
    </div>

{% endblock %}
